# 飞书机器人配置
# 也可以通过环境变量 FEISHU_APP_ID / FEISHU_APP_SECRET 设置

app_id: ""
app_secret: ""

# 安全控制（留空则允许所有人）
allowed_users: []    # 允许的用户 open_id 列表
allowed_chats: []    # 允许的群聊 chat_id 列表

# Claude Code 配置
claude_bin: "claude"                         # claude 可执行文件路径
default_cwd: "/Volumes/data/sources"         # 默认工作目录
claude_danger_mode: false                    # 是否跳过所有权限检查

# Claude Code 超时配置（分钟）
claude_ask_timeout: 50                       # /ask 命令超时时间（默认 50 分钟）
claude_session_timeout: 50                   # /session 会话响应超时（默认 50 分钟）

# 消息分块配置
max_chunk_size: 3500                         # 长消息分块大小（默认 3500 字符）

# claude -p 模式下允许的工具（非 danger 模式时生效）
claude_allowed_tools:
  - "Read"
  - "Glob"
  - "Grep"
  - "Bash(git status)"
  - "Bash(git log)"
  - "Bash(git diff)"

# 项目别名映射（使用 @别名 快捷访问）
projects:
  server: "/Volumes/data/sources/server_migration"
  devops: "/Volumes/data/sources/devops"
  # myproject: "/path/to/myproject"

# Shell 白名单（/shell 命令只能执行这些前缀的命令）
shell_whitelist:
  - "docker ps"
  - "docker stats"
  - "git status"
  - "git log"
  - "systemctl status"
  - "df -h"
  - "free -h"
  - "uptime"
  - "nvidia-smi"

# Hook 服务端口（供 Claude Code hooks 回调）
hook_port: 9876

# 默认通知目标（Claude Code hooks 不指定 chat_id 时发送到此聊天）
notify_chat_id: ""

# 定时状态推送
status_push_interval: 180            # 推送间隔（分钟），0 则禁用（默认 180，即 3 小时）
status_push_chat_id: ""              # 推送目标群聊，为空则用 notify_chat_id

# 日志级别: debug, info, warn, error
log_level: "info"
